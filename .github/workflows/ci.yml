name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: swift test --disable-sandbox

      - name: Build app
        run: ./scripts/build-app.sh

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Limit-Bar
          path: dist/Codex Limit Bar.app
